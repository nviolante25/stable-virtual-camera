model:
  base_learning_rate: 1.0e-8
  target: sgm.models.diffusion.DiffusionEngine
  params:
    scale_factor: 0.18215
    disable_first_stage_autocast: True
    input_key: clean_latent
    network_wrapper: sgm.modules.diffusionmodules.wrappers.SevaWrapper

    scheduler_config:
      target: sgm.lr_scheduler.LambdaLinearScheduler
      params:
        warm_up_steps: [10000]
        cycle_lengths: [10000000000000]
        f_start: [1.e-6]
        f_max: [1.]
        f_min: [1.]

    denoiser_config:
      target: sgm.modules.diffusionmodules.denoiser.DiscreteDenoiser
      params:
        num_idx: 1000

        scaling_config:
          target: sgm.modules.diffusionmodules.denoiser_scaling.EpsScaling
        discretization_config:
          target: sgm.modules.diffusionmodules.discretizer.LegacyDDPMDiscretization

    # test original Seva model (no LoRA): results pretty much the same as with LoRA initially
    network_config:
      target: seva.utils.load_model
      params:
        pretrained_model_name_or_path: "stabilityai/stable-virtual-camera"
        weight_name: "model.safetensors"
        device: "cuda"
        verbose: True
        freeze: True # only freezes input and output blocks

    # network_config:
    #   target: seva.modules.lora_wrapper.SevaLoRAWrapper
    #   params:
    #     seva_model_config:
    #       # target: seva.model.Seva
    #       target: seva.utils.load_model
    #       params:
    #         # params:
    #         #   in_channels: 11
    #         #   model_channels: 320  # for Seva.time_embed
    #         #   out_channels: 4
    #         #   num_frames: 8
    #         #   num_res_blocks: 2
    #         #   attention_resolutions: [4, 2, 1]
    #         #   channel_mult: [1, 2, 4, 4]
    #         #   num_head_channels: 64
    #         #   transformer_depth: [1, 1, 1, 1]
    #         #   context_dim: 1024
    #         #   dense_in_channels: 6
    #         #   dropout: 0.0
    #         #   unflatten_names: ["middle_ds8", "output_ds4", "output_ds2"]
    #         #   ckpt_path: null
    #         pretrained_model_name_or_path: "stabilityai/stable-virtual-camera"
    #         weight_name: "model.safetensors"
    #         device: "cuda"
    #         verbose: True
    #     self_attn_rank: 4
    #     cross_attn_rank: 8
    #     alpha: 4.0
    #     dropout: 0.0
    #     target_modules: ["TransformerBlockTimeMix", "MultiviewTransformer", "TransformerBlock"]
    #     keys_to_lora: ["q", "k", "v"]
    #     excluded_modules: []

    conditioner_config:
      target: sgm.modules.GeneralConditioner
      params:
        emb_models:
          - is_trainable: False
            ucg_rate: 0.0
            input_key: plucker
            target: sgm.modules.encoders.modules.IdentityEncoder

          - is_trainable: False
            ucg_rate: 0.0
            input_key: concat
            target: sgm.modules.encoders.modules.IdentityEncoder

          - is_trainable: False
            ucg_rate: 0.0
            input_key: replace
            target: sgm.modules.encoders.modules.IdentityEncoder

          - is_trainable: False
            ucg_rate: 0.0
            input_key: mask
            target: sgm.modules.encoders.modules.IdentityEncoder

          - is_trainable: False # crossattn
            ucg_rate: 0.0
            input_keys: ["frames", "mask"]
            target: sgm.modules.encoders.modules.SevaFrozenOpenCLIPImageEmbedder
            params:
              unsqueeze_dim: True

    # first_stage_config:
    #   target: sgm.models.autoencoder.IdentityFirstStage

    # first_stage_config:
    #   target: sgm.models.autoencoder.IdentityFirstStage
    first_stage_config:
      target: sgm.models.autoencoder.DecoderOnlyAutoencoderKL
      params:
        module:
          target: seva.modules.autoencoder.AutoEncoder

    loss_fn_config:
      target: sgm.modules.diffusionmodules.loss.StandardDiffusionLoss
      params:
        loss_weighting_config:
          target: sgm.modules.diffusionmodules.loss_weighting.SevaWeighting
        sigma_sampler_config:
          target: sgm.modules.diffusionmodules.sigma_sampling.DiscreteSampling
          params:
            num_idx: 1000

            discretization_config:
              target: sgm.modules.diffusionmodules.discretizer.LegacyDDPMDiscretization

    sampler_config:
      target: sgm.modules.diffusionmodules.sampling.EulerEDMSampler
      params:
        num_steps: 50

        discretization_config:
          target: sgm.modules.diffusionmodules.discretizer.LegacyDDPMDiscretization

        guider_config:
          target: sgm.modules.diffusionmodules.guiders.VanillaCFG
          params:
            scale: 7.5

data:
  target: seva.data.mvh_dataloader.MVHumanNetLoader
  params:
    # root_dir: /workspace/datasetvol/mvhuman_data/mv_captures
    # latents_dir: /workspace/datasetvol/mvhuman_data/mv_latents
    root_dir: /home/stone/dev/datasets/mvhumannet_samples/mv_captures
    latents_dir: /home/stone/dev/datasets/mvhumannet_samples/mv_latents
    batch_size: 2
    num_workers: 16
    num_images: 8
    only_include: ["100001", "100002"]

lightning:
  modelcheckpoint:
    params:
      every_n_train_steps: 5000

  callbacks:
    metrics_over_trainsteps_checkpoint:
      params:
        every_n_train_steps: 25000

    image_logger:
      target: main.ImageLogger
      params:
        disabled: False
        enable_autocast: False
        batch_frequency: 1000
        max_images: 8
        increase_log_steps: True # for debug, set True
        log_first_step: False
        log_images_kwargs:
          use_ema_scope: False
          N: 2 # how many batches to process for image logging
          n_rows: 2

  trainer:
    devices: 0,
    benchmark: True
    num_sanity_val_steps: 0
    accumulate_grad_batches: 1
    max_epochs: 1000